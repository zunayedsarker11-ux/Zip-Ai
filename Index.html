<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Mobile specific fixes */
        body { -webkit-tap-highlight-color: transparent; }
        .chat-container { height: calc(100dvh - 80px); }
        
        /* Dark mode overrides for specific elements */
        .dark .bg-sidebar { background-color: #1e1f20; }
        .dark .bg-chat { background-color: #131314; }
        .dark .text-gemini { color: #e3e3e3; }
        
        #loading {
            position: fixed; inset: 0; background: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-family: sans-serif;
        }
        .hidden { display: none !important; }
        
        pre { background: #f4f4f4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .dark pre { background: #282a36; color: #f8f8f2; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-200">

    <div id="loading">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-2 text-sm font-medium">Initializing AI Interface...</p>
        </div>
    </div>

    <div id="app" class="flex flex-col md:flex-row min-h-[100dvh] hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gray-100 dark:bg-sidebar transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 border-r dark:border-gray-700 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <button onclick="createNewChat()" class="flex items-center gap-2 bg-white dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 px-4 py-2 rounded-full shadow-sm transition-all w-full text-sm font-medium">
                    <span class="text-xl">+</span> New Chat
                </button>
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-500">✕</button>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                </div>

            <div class="p-4 border-t dark:border-gray-700 space-y-2">
                <button onclick="openSettings()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg flex items-center gap-3">
                    ⚙️ Settings
                </button>
                <button onclick="toggleDarkMode()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg flex items-center gap-3">
                    🌙 Dark Mode
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white dark:bg-chat min-w-0">
            <header class="p-4 flex items-center justify-between border-b dark:border-gray-700 md:hidden">
                <button onclick="toggleSidebar()" class="p-2">☰</button>
                <h1 class="font-semibold dark:text-white">AI Assistant</h1>
                <div class="w-8"></div>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                <div id="welcome-screen" class="max-w-2xl mx-auto mt-20 text-center space-y-4">
                    <h2 class="text-4xl font-bold text-gray-300 dark:text-gray-700">Hello, how can I help?</h2>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 md:left-auto md:w-[calc(100%-18rem)] p-4 bg-gradient-to-t from-white dark:from-chat via-white dark:via-chat to-transparent">
                <div class="max-w-3xl mx-auto relative flex items-end gap-2 bg-gray-100 dark:bg-gray-800 rounded-2xl p-2 shadow-lg border border-transparent focus-within:border-blue-400">
                    <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full p-2 bg-transparent outline-none resize-none max-h-48 dark:text-white" oninput="autoResize(this)"></textarea>
                    <button id="send-btn" onclick="handleSendMessage()" class="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-gray-400">Powered by OpenRouter. Ensure API Key is set in Settings.</p>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 dark:text-white">Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="sk-or-...">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-2 rounded border dark:bg-gray-700 dark:border-gray-600 dark:text-white text-sm" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-sm">Cancel</button>
                <button onclick="saveSettings()" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- INITIAL STATE & STORE ---
        let state = {
            apiKey: localStorage.getItem('api_key') || '',
            model: localStorage.getItem('model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('system_prompt') || 'You are a helpful AI assistant.',
            chats: JSON.parse(localStorage.getItem('chats')) || [],
            currentChatId: null,
            isDark: localStorage.getItem('dark_mode') === 'true'
        };

        // --- CORE INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            if (state.isDark) document.documentElement.classList.add('dark');
            renderChatList();
            
            // Hide loader
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            // Handle Enter key for messaging
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
        });

        // --- UI ACTIONS ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function toggleDarkMode() {
            state.isDark = !state.isDark;
            localStorage.setItem('dark_mode', state.isDark);
            document.documentElement.classList.toggle('dark');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function openSettings() {
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value;
            state.model = document.getElementById('model-input').value || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value;
            
            localStorage.setItem('api_key', state.apiKey);
            localStorage.setItem('model', state.model);
            localStorage.setItem('system_prompt', state.systemPrompt);
            
            closeSettings();
        }

        // --- CHAT LOGIC ---
        function createNewChat() {
            const id = Date.now().toString();
            const newChat = {
                id,
                title: 'New Conversation',
                messages: [],
                systemPrompt: state.systemPrompt
            };
            state.chats.unshift(newChat);
            state.currentChatId = id;
            saveAndRender();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function selectChat(id) {
            state.currentChatId = id;
            renderMessages();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('chats', JSON.stringify(state.chats));
            renderChatList();
            renderMessages();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(chat => `
                <div onclick="selectChat('${chat.id}')" class="group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${state.currentChatId === chat.id ? 'bg-gray-200 dark:bg-gray-700' : 'hover:bg-gray-200 dark:hover:bg-gray-800'}">
                    <span class="truncate text-sm dark:text-gray-300 pr-2">${chat.title}</span>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            const welcome = document.getElementById('welcome-screen');
            const chat = state.chats.find(c => c.id === state.currentChatId);

            if (!chat || chat.messages.length === 0) {
                container.innerHTML = '';
                container.appendChild(welcome);
                welcome.classList.remove('hidden');
                return;
            }

            welcome.classList.add('hidden');
            container.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300">
                    <div class="max-w-[85%] md:max-w-[70%] ${m.role === 'user' ? 'bg-blue-600 text-white rounded-2xl px-4 py-2' : 'bg-transparent dark:text-gray-200 w-full'}">
                        ${m.role === 'assistant' ? '<div class="text-xs font-bold mb-1 text-blue-500">AI</div>' : ''}
                        <div class="prose dark:prose-invert max-w-none text-sm leading-relaxed">
                            ${m.role === 'user' ? m.content : marked.parse(m.content)}
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        // --- API & STREAMING ---
        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const content = input.value.trim();
            if (!content || !state.apiKey) {
                if (!state.apiKey) alert('Please enter an API Key in Settings');
                return;
            }

            // Create chat if none selected
            if (!state.currentChatId) {
                createNewChat();
            }

            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            // Update Title on first message
            if (chat.messages.length === 0) chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');

            // Add user message
            chat.messages.push({ role: 'user', content });
            input.value = '';
            input.style.height = 'auto';
            renderMessages();

            // Prepare Assistant Placeholder
            const assistantMsg = { role: 'assistant', content: '' };
            chat.messages.push(assistantMsg);
            const msgIdx = chat.messages.length - 1;
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: 'system', content: chat.systemPrompt },
                            ...chat.messages.slice(0, -1)
                        ],
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(await response.text());

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        const message = line.replace(/^data: /, '');
                        if (message === '[DONE]') break;
                        
                        try {
                            const parsed = JSON.parse(message);
                            const token = parsed.choices[0]?.delta?.content || '';
                            assistantMsg.content += token;
                            
                            // Real-time update (throttle rendering for performance)
                            updateLiveMessage(msgIdx, assistantMsg.content);
                        } catch (e) {
                            console.error("Chunk parsing error", e);
                        }
                    }
                }
                saveAndRender();
            } catch (error) {
                assistantMsg.content = `❌ Error: ${error.message}`;
                saveAndRender();
            }
        }

        function updateLiveMessage(idx, content) {
            const container = document.getElementById('messages-container');
            const msgDivs = container.querySelectorAll('.animate-in');
            const targetDiv = msgDivs[idx];
            
            if (targetDiv) {
                const contentDiv = targetDiv.querySelector('.prose');
                contentDiv.innerHTML = marked.parse(content);
                container.scrollTop = container.scrollHeight;
            } else {
                renderMessages();
            }
        }
    </script>
</body>
</html>
